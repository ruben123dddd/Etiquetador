<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
            color: #111;
        }
        .card {
            width: min(100%, 480px);
            padding: 32px;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 24px 80px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            margin: 0 0 16px;
            font-size: 2rem;
        }
        p {
            margin: 0 0 24px;
            color: #555;
        }
        .links {
            display: grid;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 14px 18px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            background: #007bff;
        }
        .links a.secondary {
            background: #6c757d;
        }
        .links a:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Panel de Aplicaciones</h1>
        <p>Elige una opción para ir a la aplicación correspondiente.</p>
        <div class="links">
            <a href="/generator">Generador de etiquetas</a>
            <a class="secondary" href="/codigos/">Gestión de inventario</a>
            <a class="secondary" href="/docs">Documentación API</a>
        </div>
    </div>
</body>
</html>
